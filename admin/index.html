<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Админ панель</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/admin/admin.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--color-bg-alt, #F4F5F7);
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 16px;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .login-logo {
      font-family: var(--font-heading, 'Montserrat', sans-serif);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-text, #2F343A);
      text-align: center;
      margin-bottom: 8px;
    }
    .login-subtitle {
      font-size: 0.875rem;
      color: var(--color-text-secondary, #6B7280);
      text-align: center;
      margin-bottom: 32px;
    }
    .login-form .form-group {
      margin-bottom: 20px;
    }
    .login-form label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-text, #2F343A);
      margin-bottom: 6px;
    }
    .login-form input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--color-border, #E2E6EA);
      border-radius: 8px;
      font-size: 0.9375rem;
      font-family: inherit;
      color: var(--color-text, #2F343A);
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .login-form input:focus {
      border-color: var(--color-accent, #2F343A);
    }
    .login-form .btn {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      margin-top: 8px;
    }
    .login-error {
      display: none;
      background: #FEE2E2;
      color: #B91C1C;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.875rem;
      margin-bottom: 16px;
      text-align: center;
    }
    .login-error.is-visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">Ритуальные товары</div>
      <div class="login-subtitle">Панель управления</div>

      <div class="login-error" id="login-error">Неверный email или пароль</div>

      <form class="login-form" id="login-form" autocomplete="on">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="admin@site.local" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn--primary" id="login-btn">Войти</button>
      </form>
    </div>
  </div>

  <script>
    // Если уже авторизован — редирект
    if (localStorage.getItem('adminToken')) {
      try {
        fetch('/admin/api/me', {
          headers: { 'Authorization': 'Bearer ' + localStorage.getItem('adminToken') }
        }).then(function(r) {
          if (r.ok) window.location.href = '/admin/dashboard.html';
        });
      } catch(e) {}
    }

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var errorEl = document.getElementById('login-error');
      var btn = document.getElementById('login-btn');
      errorEl.classList.remove('is-visible');
      btn.disabled = true;
      btn.textContent = 'Входим...';

      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;

      try {
        var res = await fetch('/admin/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        });
        var data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('adminToken', data.token);
          window.location.href = '/admin/dashboard.html';
        } else {
          errorEl.textContent = data.error || 'Неверный email или пароль';
          errorEl.classList.add('is-visible');
          btn.disabled = false;
          btn.textContent = 'Войти';
        }
      } catch (err) {
        errorEl.textContent = 'Ошибка соединения с сервером';
        errorEl.classList.add('is-visible');
        btn.disabled = false;
        btn.textContent = 'Войти';
      }
    });
  </script>
</body>
</html>
